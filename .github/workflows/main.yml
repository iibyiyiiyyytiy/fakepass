name: Build FakePass DEB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: brew install ldid dpkg

      - name: Setup Theos Environment
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Setup iOS SDK (14.5)
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth 1 --sparse https://github.com/theos/sdks.git $HOME/theos/sdks
          cd $HOME/theos/sdks
          git sparse-checkout set iPhoneOS14.5.sdk

      - name: Install Theos-Compatible XPC Headers
        run: |
          git clone --depth 1 https://github.com/JonasGessner/Theos-NIC-Templates.git $HOME/xpc-headers
          mkdir -p $THEOS/include
          cp -r "$HOME/xpc-headers/XPC_Service.nic/xpc" "$THEOS/include/"

      - name: Build & Install libSandy
        run: |
          git clone --depth 1 https://github.com/opa334/libSandy.git $HOME/libSandy
          cd $HOME/libSandy
          chmod +x install_to_theos.sh
          ./install_to_theos.sh

      - name: Build Rootful Package
